<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whiteboard AI Pro</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; text-align: center; }
        textarea { width: 100%; height: 80px; margin-bottom: 10px; padding: 10px; font-size: 16px; }
        .btn-primary { padding: 10px 20px; font-size: 16px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 5px; }
        .btn-secondary { padding: 10px 20px; font-size: 14px; cursor: pointer; background-color: #6c757d; color: white; border: none; border-radius: 5px; margin: 5px; }
        .btn-success { padding: 10px 20px; font-size: 16px; cursor: pointer; background-color: #28a745; color: white; border: none; border-radius: 5px; margin-top: 20px; display: none; }
        #canvasContainer { margin-top: 20px; display: flex; justify-content: center; }
        canvas { border: 2px solid #333; background-color: #fff; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        
        /* Gaya untuk Galeri Gambar Ala Canva */
        #galleryContainer { margin: 20px 0; padding: 15px; border: 1px dashed #007bff; border-radius: 8px; background: #f8f9fa; min-height: 100px; }
        .ikon-hasil { width: 60px; height: 60px; margin: 10px; cursor: pointer; border: 2px solid transparent; border-radius: 5px; transition: 0.2s; }
        .ikon-hasil:hover { border: 2px solid #007bff; transform: scale(1.1); }
        #gambarTerpilihInfo { color: #dc3545; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>Whiteboard AI Pro 🎨</h1>
    <p>1. Masukkan skrip ceritamu (AI akan mencari gambar dari internet)</p>
    
    <textarea id="scriptInput" placeholder="Contoh: Kucing ini sedang minum susu di atas meja..."></textarea>
    <br>
    <button id="searchBtn" class="btn-primary">Menganalisis Skrip & Cari Gambar</button>

    <!-- Galeri Pencarian Internet & Upload Manual -->
    <div id="galleryContainer">
        <p style="margin-top:0; color: #666;">Hasil Pencarian Gambar (Klik untuk memilih):</p>
        <div id="imageGallery"></div>
        
        <hr style="border: 0; border-top: 1px solid #ccc; margin: 15px 0;">
        <button id="uploadManualBtn" class="btn-secondary">📁 Unggah Gambar Sendiri</button>
        <input type="file" id="fileInput" accept="image/png, image/jpeg, image/svg+xml" style="display: none;">
        
        <p id="gambarTerpilihInfo">Gambar Terpilih: 0 / 3</p>
    </div>

    <!-- Tombol Rekam (Muncul setelah gambar dipilih) -->
    <button id="recordBtn" class="btn-success">Mulai Render Video & Rekam!</button>

    <div id="canvasContainer">
        <canvas id="whiteboardCanvas" width="640" height="360"></canvas>
    </div>

    <div style="text-align: center; margin-top: 15px;">
    <a id="downloadBtn" download="hasil-whiteboard.webm" style="display: none; padding: 12px 24px; background-color: #28a745; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; font-family: sans-serif; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        ⬇️ Download Video Hasil Rekaman
    </a>
</div>

    <script src="app.js"></script>
</body>
</html>
